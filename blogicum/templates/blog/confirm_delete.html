{% extends "base.html" %}

{% block title %}Подтверждение удаления{% endblock %}

{% block content %}
  <h1>Удаление</h1>
  <p>Вы уверены, что хотите удалить ?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit">Да, удалить</button>
    <a href="
      {% if object.post %}
        {% url 'blog:post_detail' object.post.id %}
      {% else %}
        {% url 'blog:post_detail' object.id %}
      {% endif %}
    ">Отмена</a>
  </form>
{% endblock %}
